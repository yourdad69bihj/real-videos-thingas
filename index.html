<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS ELITE | REAL MATCH</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --purple: #BC13FE; --dark: #0A0014; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* 50/50 Video Side */
        .video-container { width: 50%; display: flex; flex-direction: column; border-right: 2px solid var(--purple); background: #000; }
        .v-box { flex: 1; border-bottom: 2px solid #111; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px; border: 1px solid var(--purple); font-size: 10px; font-weight: bold; z-index: 5; }

        /* Chat Side */
        .chat-container { width: 50%; display: flex; flex-direction: column; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; background: rgba(188, 19, 254, 0.05); }
        .controls { padding: 20px; background: #000; border-top: 1px solid var(--purple); display: flex; gap: 10px; }
        
        .btn { background: var(--purple); color: white; border: none; padding: 15px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-skip { background: #444; }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="v-box">
            <div class="label">STRANGER</div>
            <video id="remoteVid" autoplay playsinline></video>
        </div>
        <div class="v-box">
            <div class="label">YOU</div>
            <video id="localVid" autoplay playsinline muted></video>
        </div>
    </div>

    <div class="chat-container">
        <div id="chat-box"><p style="color:gray">Click 'Start' to meet real people...</p></div>
        <div class="controls">
            <button class="btn" onclick="startApp()">START</button>
            <button class="btn btn-skip" onclick="skip()">SKIP</button>
        </div>
    </div>

    <script>
        let peer, localStream, currentCall;
        const SERVER_URL = 'your-server-name.replit.app'; // PUT YOUR SERVER URL HERE

        async function startApp() {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVid').srcObject = localStream;

            peer = new Peer('js-' + Math.floor(Math.random()*99999), {
                host: SERVER_URL,
                port: 443,
                path: '/js-elite',
                secure: true
            });

            peer.on('call', (call) => {
                call.answer(localStream);
                setupCall(call);
            });

            peer.on('open', (id) => log("Connected. Searching..."));
        }

        function setupCall(call) {
            currentCall = call;
            call.on('stream', (stream) => {
                document.getElementById('remoteVid').srcObject = stream;
                log("Stranger found!");
            });
        }

        function skip() {
            if (currentCall) currentCall.close();
            document.getElementById('remoteVid').srcObject = null;
            log("Skipped. Finding new stranger...");
            // The server logic will handle re-pairing automatically
        }

        function log(t) {
            document.getElementById('chat-box').innerHTML += `<p>> ${t}</p>`;
        }
    </script>
</body>
</html>
