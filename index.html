<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS ELITE | REAL VIDEO CHAT</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --purple: #BC13FE; --dark: #0A0014; --card: #150028; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        .app-container { display: flex; height: 100vh; }

        /* Video Section - 50/50 Equal Split */
        .video-section { width: 50%; display: flex; flex-direction: column; background: #000; border-right: 2px solid var(--purple); }
        .video-box { flex: 1; position: relative; overflow: hidden; background: #050505; border-bottom: 2px solid #111; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        .label { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 4px; font-size: 12px; border: 1px solid var(--purple); z-index: 10; font-weight: bold; }

        /* Chat Section */
        .chat-section { width: 50%; display: flex; flex-direction: column; background: var(--dark); }
        .navbar { background: #000; padding: 15px; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 8px; font-size: 14px; }
        .you { align-self: flex-end; background: var(--purple); }
        .stranger { align-self: flex-start; background: var(--card); border: 1px solid var(--purple); }
        .sys { text-align: center; color: #777; font-size: 12px; margin: 5px; }

        /* Controls */
        .input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid var(--purple); padding: 12px; color: white; border-radius: 8px; outline: none; }
        .btn { background: var(--purple); color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Start Overlay */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .modal { background: var(--card); padding: 50px; border-radius: 20px; border: 2px solid var(--purple); text-align: center; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="modal">
            <h1 style="color:var(--purple); font-size: 35px; margin-bottom: 10px;">JS ELITE CHAT</h1>
            <p style="color:#aaa; margin-bottom: 30px;">Allow Camera/Mic to find real people</p>
            <button class="btn" style="height: 60px; font-size: 18px;" onclick="startRealChat()">START SEARCHING</button>
        </div>
    </div>

    <div class="app-container">
        <div class="video-section">
            <div class="video-box">
                <div class="label">STRANGER</div>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
            <div class="video-box">
                <div class="label">YOU</div>
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
        </div>

        <div class="chat-section">
            <div class="navbar">
                <div style="color:var(--purple); font-weight:bold;">JS ELITE</div>
                <button class="btn" style="background:#444; height:35px;" onclick="skipStranger()">SKIP / NEXT</button>
            </div>
            <div id="chat-window"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendText()">
                <button class="btn" onclick="sendText()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        let peer, localStream, currentCall, currentConn;

        async function startRealChat() {
            try {
                // 1. Get Camera/Mic
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('overlay').style.display = 'none';

                // 2. Initialize PeerJS
                peer = new Peer('js-elite-' + Math.floor(Math.random() * 99999), {
                    debug: 1
                });

                peer.on('open', (id) => {
                    addSysMsg("Connected! Looking for a stranger...");
                    // Note: Real random matching usually requires a room-list server.
                    // For now, this connects to the global PeerJS cloud.
                });

                // 3. Handle Incoming Calls
                peer.on('call', (call) => {
                    call.answer(localStream);
                    setupCall(call);
                });

                // 4. Handle Incoming Messages
                peer.on('connection', (conn) => {
                    setupConn(conn);
                });

            } catch (e) {
                alert("Camera and Mic are required!");
            }
        }

        function setupCall(call) {
            currentCall = call;
            call.on('stream', (remoteStream) => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
                addSysMsg("Stranger connected!");
            });
        }

        function setupConn(conn) {
            currentConn = conn;
            conn.on('data', (data) => renderMsg(data, "stranger"));
        }

        function sendText() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if (!val) return;
            
            if (currentConn && currentConn.open) currentConn.send(val);
            renderMsg(val, "you");
            input.value = "";
        }

        function skipStranger() {
            if (currentCall) currentCall.close();
            if (currentConn) currentConn.close();
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('chat-window').innerHTML = "";
            addSysMsg("Searching for someone new...");
            // Logic to find a new ID would go here
        }

        function renderMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function addSysMsg(text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = "sys";
            div.innerText = text;
            win.appendChild(div);
        }
    </script>
</body>
</html>
