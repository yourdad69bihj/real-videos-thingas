<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS ELITE | ROOM CHAT</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --purple: #BC13FE; --dark: #0A0014; --card: #150028; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        .app-container { display: flex; height: 100vh; }

        /* Video Section - Equal 50/50 Split */
        .video-section { width: 50%; display: flex; flex-direction: column; background: #000; border-right: 2px solid var(--purple); }
        .video-box { flex: 1; position: relative; overflow: hidden; background: #050505; border-bottom: 2px solid #111; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .label { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 5px 12px; border: 1px solid var(--purple); font-size: 12px; font-weight: bold; z-index: 10; }

        /* Chat Section */
        .chat-section { width: 50%; display: flex; flex-direction: column; background: var(--dark); }
        .nav { background: #000; padding: 15px; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .controls { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid var(--purple); color: white; padding: 12px; border-radius: 8px; outline: none; }
        .btn { background: var(--purple); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Room Overlay */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .modal { background: var(--card); padding: 40px; border-radius: 20px; border: 2px solid var(--purple); text-align: center; width: 350px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="modal">
            <h1 style="color:var(--purple); margin-bottom: 10px;">JS ELITE</h1>
            <p style="color:#aaa; margin-bottom: 20px;">Enter a Room Code to match with a friend</p>
            <input type="text" id="room-input" placeholder="Room Code (e.g. 1234)" style="width: 80%; margin-bottom: 20px; text-align: center;">
            <br>
            <button class="btn" style="width: 90%;" onclick="joinRoom()">JOIN ROOM</button>
        </div>
    </div>

    <div class="app-container">
        <div class="video-section">
            <div class="video-box">
                <div class="label">STRANGER</div>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
            <div class="video-box">
                <div class="label">YOU</div>
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
        </div>

        <div class="chat-section">
            <div class="nav">
                <div id="room-display" style="color:var(--purple); font-weight:bold;">NOT CONNECTED</div>
                <button class="btn" style="background:#444; height:35px; padding:0 15px;" onclick="location.reload()">LEAVE</button>
            </div>
            <div id="chat-window"></div>
            <div class="controls">
                <input type="text" id="msg-input" placeholder="Type to chat..." onkeypress="if(event.key==='Enter') sendText()">
                <button class="btn" onclick="sendText()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        let peer, localStream, currentCall, currentConn;

        async function joinRoom() {
            const roomCode = document.getElementById('room-input').value.trim();
            if (!roomCode) return alert("Enter a code!");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('room-display').innerText = "ROOM: " + roomCode;

                // We use the room code as the Peer ID
                // Note: PeerJS IDs must be unique. One person will be "ID" and one will be "ID-2"
                peer = new Peer('js-room-' + roomCode);

                peer.on('open', (id) => {
                    addSysMsg("In Room. Waiting for friend to call...");
                });

                // If friend is already there, they might try to call a different ID.
                // This logic lets the second person call the first person automatically.
                const peer2 = new Peer(); 
                peer2.on('open', () => {
                    const call = peer2.call('js-room-' + roomCode, localStream);
                    handleCall(call);
                    const conn = peer2.connect('js-room-' + roomCode);
                    handleConn(conn);
                });

                peer.on('call', (call) => {
                    call.answer(localStream);
                    handleCall(call);
                });

                peer.on('connection', (conn) => handleConn(conn));

            } catch (e) {
                alert("Camera/Mic required!");
            }
        }

        function handleCall(call) {
            currentCall = call;
            call.on('stream', (stream) => {
                document.getElementById('remoteVideo').srcObject = stream;
                addSysMsg("Connected! Mic and Cam are live.");
            });
        }

        function handleConn(conn) {
            currentConn = conn;
            conn.on('data', (data) => renderMsg(data, "stranger"));
        }

        function sendText() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if (!val || !currentConn) return;
            currentConn.send(val);
            renderMsg(val, "you");
            input.value = "";
        }

        function renderMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function addSysMsg(t) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.style = "text-align:center; color:gray; font-size:12px; margin:10px;";
            div.innerText = t;
            win.appendChild(div);
        }
    </script>
</body>
</html>
