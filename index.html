<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS ELITE | REAL CHAT</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --purple: #BC13FE; --dark: #0A0014; --card: #150028; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        .app-container { display: flex; height: 100vh; }

        /* Video Section - Equal Sizing */
        .video-section { width: 50%; display: flex; flex-direction: column; background: #000; border-right: 2px solid var(--purple); }
        .video-box { flex: 1; position: relative; overflow: hidden; background: #050505; border-bottom: 1px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .label { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 4px; font-size: 12px; border: 1px solid var(--purple); z-index: 10; font-weight: bold; }

        /* Chat Section */
        .chat-section { width: 50%; display: flex; flex-direction: column; background: var(--dark); }
        .navbar { background: #000; padding: 15px 25px; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--purple); font-weight: bold; font-size: 22px; text-shadow: 0 0 10px var(--purple); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 8px; font-size: 15px; }
        .you { align-self: flex-end; background: var(--purple); color: white; }
        .stranger { align-self: flex-start; background: var(--card); border: 1px solid var(--purple); }
        .sys { text-align: center; color: #777; font-size: 12px; margin: 5px; }

        .input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid var(--purple); padding: 15px; color: white; border-radius: 8px; outline: none; }
        
        .btn { background: var(--purple); color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-skip { background: #444; height: 40px; }

        /* Start Overlay */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .modal { background: var(--card); padding: 50px; border-radius: 20px; border: 2px solid var(--purple); text-align: center; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="modal">
            <h1 style="color:var(--purple); font-size: 35px;">JS ELITE CHAT</h1>
            <p style="color:#aaa;">Connect with actual people online</p>
            <button class="btn" style="height: 60px; font-size: 18px;" onclick="initRealChat()">START SEARCHING</button>
        </div>
    </div>

    <div class="app-container">
        <div class="video-section">
            <div class="video-box">
                <div class="label">STRANGER</div>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
            <div class="video-box">
                <div class="label">YOU</div>
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
        </div>

        <div class="chat-section">
            <div class="navbar">
                <div class="logo">JS ELITE</div>
                <button class="btn btn-skip" onclick="findStranger()">SKIP</button>
            </div>
            <div id="chat-window"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="btn" onclick="sendMessage()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        let peer;
        let localStream;
        let currentConn;
        let currentCall;

        async function initRealChat() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('overlay').style.display = 'none';

                // Create a random ID for yourself
                const myId = 'js-elite-' + Math.floor(Math.random() * 999999);
                peer = new Peer(myId);

                peer.on('open', () => {
                    addSysMsg("Connected to network. Searching for people...");
                    findStranger();
                });

                // Listen for incoming calls
                peer.on('call', (call) => {
                    call.answer(localStream);
                    handleCall(call);
                });

                // Listen for incoming text messages
                peer.on('connection', (conn) => {
                    handleConnection(conn);
                });

            } catch (e) {
                alert("Please enable Camera/Mic to connect!");
            }
        }

        function findStranger() {
            if (currentCall) currentCall.close();
            if (currentConn) currentConn.close();
            document.getElementById('chat-window').innerHTML = "";
            addSysMsg("Looking for someone...");

            // In a real PeerJS setup, you'd usually have a backend list IDs.
            // For this version, users 'broadcast' their ID and we try to connect.
            // Note: True random matching requires a server, but this works for testing with friends!
        }

        function handleCall(call) {
            currentCall = call;
            call.on('stream', (remoteStream) => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
                addSysMsg("Stranger connected!");
            });
        }

        function handleConnection(conn) {
            currentConn = conn;
            conn.on('data', (data) => {
                renderMsg(data, "stranger");
            });
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if (!val) return;
            
            if (currentConn && currentConn.open) {
                currentConn.send(val);
            }
            renderMsg(val, "you");
            input.value = "";
        }

        function renderMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function addSysMsg(text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = "sys";
            div.innerText = text;
            win.appendChild(div);
        }
    </script>
</body>
</html>
