<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --purple: #BC13FE; --dark: #0A0014; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .video-side { width: 50%; display: flex; flex-direction: column; border-right: 2px solid var(--purple); }
        .v-box { flex: 1; background: #000; border-bottom: 1px solid #222; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .chat-side { width: 50%; display: flex; flex-direction: column; padding: 20px; }
        .btn { background: var(--purple); color: white; border: none; padding: 15px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="video-side">
        <div class="v-box"><video id="remoteVid" autoplay playsinline></video></div>
        <div class="v-box"><video id="localVid" autoplay playsinline muted></video></div>
    </div>
    <div class="chat-side">
        <div id="status">Status: Offline</div>
        <button class="btn" onclick="startSearch()">START LOOKING</button>
        <button class="btn" style="background:#444" onclick="location.reload()">SKIP / NEXT</button>
    </div>

    <script>
        const socket = io('https://your-server-url.com'); // Put your Render/Replit URL here
        let peer, localStream;

        async function startSearch() {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVid').srcObject = localStream;
            
            peer = new Peer(); 
            peer.on('open', (id) => {
                socket.emit('join-lobby', id);
                document.getElementById('status').innerText = "Status: Searching...";
            });

            // When the server finds a match for you
            socket.on('match', (strangerPeerId) => {
                const call = peer.call(strangerPeerId, localStream);
                call.on('stream', (stream) => {
                    document.getElementById('remoteVid').srcObject = stream;
                    document.getElementById('status').innerText = "Status: Connected!";
                });
            });

            // When someone else calls you
            peer.on('call', (call) => {
                call.answer(localStream);
                call.on('stream', (stream) => {
                    document.getElementById('remoteVid').srcObject = stream;
                    document.getElementById('status').innerText = "Status: Connected!";
                });
            });
        }
    </script>
</body>
</html>
